        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #040d0c;
            background-image: radial-gradient(circle at 50% 50%, #081d1a 0%, #040d0c 100%);
        }
        
        .title-font {
            font-family: 'Playfair Display', serif;
        }

        .mono {
            font-family: 'Space Mono', monospace;

        /* Gold gradient borders */
        .gold-border {
            border-image: linear-gradient(to right, #dfb15b, #1b3f3a) 1;

            0%, 100% { transform: scale(1); filter: brightness(1); }

        function App() {
            const [activeTab, setActiveTab] = useState('radiology');
            const [selectedPathogen, setSelectedPathogen] = useState('spneumo');

            const [quizIndex, setQuizIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [quizAnswered, setQuizAnswered] = useState(false);
            const [stellaCount, setStellaCount] = useState(0);
            const [tonitrusCount, setTonitrusCount] = useState(0);
            
            // CURB-65 Calculator State
            const [curb, setCurb] = useState({
                confusion: false,
                urea: false,
                respRate: false,
                bp: false,
                age: false
            });

            // Interactive Differential Matrix Filter State
            const [diffFilter, setDiffFilter] = useState({
                risk: 'all',
                sputum: 'all',
                lab: 'all'
            });

            const pathogen = PATHOGENS[selectedPathogen];

            const curbScore = useMemo(() => {
                let score = 0;
                if (curb.confusion) score++;
                if (curb.urea) score++;
                if (curb.respRate) score++;
                if (curb.bp) score++;
                if (curb.age) score++;
                return score;
            }, [curb]);

            const curbRecommendation = useMemo(() => {
                if (curbScore <= 1) {
                    return {
                        level: "Low Risk (Stella Potential!)",
                        action: "Outpatient Management (Home Mission)",
                        color: "text-emerald-400 border-emerald-950 bg-emerald-950/20",
                        desc: "Twilight advises: Safe for home recovery. Prescribe amoxicillin or doxycycline/macrolide. Let Anya monitor them!"

                    return {
                        level: "Moderate Risk (Caution Advised)",
                        action: "Inpatient Ward Admission or Close Supervision",
                        color: "text-amber-400 border-amber-950 bg-amber-950/20",
                        desc: "Twilight advises: Consider short-stay inpatient admission. Deploy dual therapy (Beta-lactam + Macrolide) to neutralize all typical & atypical pathways."

                    return {
                        level: "Severe Risk (Expulsion Threat / Critical)",
                        action: "Urgent Hospitalization & Immediate ICU Admission",
                        color: "text-rose-400 border-rose-950 bg-rose-950/20",
                        desc: "Twilight advises: Critical threat! Secure an ICU bed immediately. Administer broad-spectrum coverage to prevent septic shock."
                    };
                }
            }, [curbScore]);

            const filteredPathogens = useMemo(() => {
                return Object.values(PATHOGENS).filter(p => {
                    let matchRisk = true;
                    let matchSputum = true;
                    let matchLab = true;

                    if (diffFilter.risk !== 'all') {
                        const r = diffFilter.risk;
                        if (r === 'alcohol') matchRisk = p.riskFactors.toLowerCase().includes('alcohol') || p.id === 'klebsiella';
                        if (r === 'flu') matchRisk = p.riskFactors.toLowerCase().includes('influenza') || p.id === 'saureus';
                        if (r === 'young') matchRisk = p.riskFactors.toLowerCase().includes('young') || p.id === 'mycoplasma';
                        if (r === 'cystic') matchRisk = p.riskFactors.toLowerCase().includes('cystic') || p.id === 'pseudomonas';
                        if (r === 'water') matchRisk = p.transmission.toLowerCase().includes('water') || p.id === 'legionella';
                    }

                    if (diffFilter.sputum !== 'all') {
                        const s = diffFilter.sputum;
                        if (s === 'rust') matchSputum = p.symptoms.toLowerCase().includes('rust');
                        if (s === 'currant') matchSputum = p.symptoms.toLowerCase().includes('currant');
                        if (s === 'green') matchSputum = p.symptoms.toLowerCase().includes('green') || p.id === 'pseudomonas';
                        if (s === 'dry') matchSputum = p.symptoms.toLowerCase().includes('dry') || p.symptoms.toLowerCase().includes('non-productive');
                    }

                    if (diffFilter.lab !== 'all') {
                        const l = diffFilter.lab;
                        if (l === 'sodium') matchLab = p.anyaTelepathy.toLowerCase().includes('hyponatremia') || p.id === 'legionella';
                        if (l === 'cold') matchLab = p.microDetails.toLowerCase().includes('cold agglutinins') || p.id === 'mycoplasma';
                        if (l === 'clusters') matchLab = p.gram.toLowerCase().includes('clusters') || p.id === 'saureus';
                        if (l === 'capsule') matchLab = p.microDetails.toLowerCase().includes('capsule') || p.id === 'klebsiella';
                    }

                    return matchRisk && matchSputum && matchLab;
                });
            }, [diffFilter]);

            const handleQuizAnswer = (option) => {
                if (quizAnswered) return;
                setSelectedOption(option);
                setQuizAnswered(true);
                if (option.correct) {
                    setStellaCount(prev => prev + 1);
                } else {
                    setTonitrusCount(prev => prev + 1);

            const nextQuizQuestion = () => {
                setSelectedOption(null);
                setQuizAnswered(false);
                setQuizIndex(prev => (prev + 1) % CASES.length);
            };

                setSelectedOption(null);
                setQuizAnswered(false);
                setQuizIndex(0);
                setStellaCount(0);
                setTonitrusCount(0);

                <div className="min-h-screen flex flex-col bg-spy-base text-slate-200">
                    
                    {/* Spy Header with Gold Trim */}
                    <header className="border-b-2 border-spy-gold bg-spy-panel/90 backdrop-blur-md sticky top-0 z-50 px-4 py-4 md:px-8 flex flex-col xl:flex-row xl:items-center justify-between gap-4 shadow-xl">
                        <div className="flex items-center gap-3">

                                <span className="text-xl font-bold text-spy-base">𓁹</span>

                        <div className="flex flex-wrap bg-spy-base/80 p-1.5 rounded-xl border border-spy-border self-start xl:self-auto">
                            <button

                                className={`px-4 py-2.5 text-xs font-bold rounded-lg transition-all ${activeTab === 'radiology' ? 'bg-spy-gold text-spy-base shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                            >

                            <button

                            >
                                🗝️ Top-Secret Decrypter Matrix
                            </button>
                            <button

                            </button>
                        </div>
                    </header>

                    {/* Main content wrapper */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-8 space-y-6">
                        
                        {/* School/Spy Stats Header */}

                                                                    <circle cx="280" cy="245" r="7" fill="#dfb15b" stroke="#ffffff" strokeWidth="2" className="marker-glow cursor-pointer" />
                                                                    <text x="210" y="215" fill="#dfb15b" fontSize="10" fontWeight="bold">Thickened Bronchial Pipelines</text>
                                                                </g>
                                                            )}
                                                        </g>
                                                    )}
                                                </svg>
                                            )}
                                        </div>

                                        {/* Description of what they are looking at */}
                                        <div className="bg-spy-base/80 p-4 rounded-xl border border-spy-border">
                                            <h4 className="text-xs font-bold text-spy-gold uppercase tracking-widest mb-1">
                                                {scanType === 'cxr' ? 'Twilight AP Chest Radiogram View' : 'High-Resolution Axial Chest Slice CT'}
                                            </h4>
                                            <p className="text-sm text-slate-300 font-light leading-relaxed">
                                                {scanType === 'cxr' ? pathogen.cxrDesc : pathogen.ctDesc}
                                            </p>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab Content 2: Top-Secret Decrypter Matrix */}
                        {activeTab === 'matrix' && (
                            <div className="space-y-6">
                                <div className="bg-spy-panel p-6 rounded-2xl border border-spy-border shadow-xl">
                                    <h2 className="text-lg font-bold text-spy-gold mb-2 title-font">Secret Cipher Diagnostic Matcher</h2>
                                    <p className="text-sm text-slate-400 max-w-3xl mb-6">
                                        Filter pathogen records instantly using intelligence markers. Select patient background, sputum traits, and unusual lab indices to narrow down the target suspect.
                                    </p>

                                    {/* Selectors Row */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        
                                        {/* Risk Factor Filter */}
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-spy-pink uppercase tracking-widest">Suspect Risk Profile</label>
                                            <select 
                                                value={diffFilter.risk}
                                                onChange={(e) => setDiffFilter({...diffFilter, risk: e.target.value})}
                                                className="w-full bg-spy-base border border-spy-border rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-spy-gold text-slate-200"
                                            >
                                                <option value="all">Any Risk Profile / Setting</option>
                                                <option value="alcohol">Alcohol Use (Impaired Airway Guard)</option>
                                                <option value="flu">Post-Influenza Viral Invasion</option>
                                                <option value="young">Young Student living in Eden Dorms</option>
                                                <option value="cystic">Cystic Fibrosis / ICU Ventilator Dependent</option>
                                                <option value="water">Exposure to Coolant Water Systems</option>
                                            </select>
                                        </div>

                                        {/* Sputum Filter */}
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-spy-pink uppercase tracking-widest">Sputum Traits</label>
                                            <select 
                                                value={diffFilter.sputum}
                                                onChange={(e) => setDiffFilter({...diffFilter, sputum: e.target.value})}
                                                className="w-full bg-spy-base border border-spy-border rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-spy-gold text-slate-200"
                                            >
                                                <option value="all">Any Secretions Style</option>
                                                <option value="rust">Rust-Colored Sputum</option>
                                                <option value="currant">"Currant Jelly" Sticky Dark Red</option>
                                                <option value="green">Bright Greenish Exudate</option>
                                                <option value="dry">Dry / Hacking Non-productive</option>
                                            </select>
                                        </div>

                                        {/* Lab Markers Filter */}
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-spy-pink uppercase tracking-widest">Classified Lab Findings</label>
                                            <select 
                                                value={diffFilter.lab}
                                                onChange={(e) => setDiffFilter({...diffFilter, lab: e.target.value})}
                                                className="w-full bg-spy-base border border-spy-border rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-spy-gold text-slate-200"
                                            >
                                                <option value="all">Any Special Lab Clue</option>
                                                <option value="sodium">Severe Hyponatremia (Sodium &lt; 130)</option>
                                                <option value="cold">Positive Cold Agglutinins (IgM)</option>
                                                <option value="clusters">Gram-positive Grape Clusters</option>
                                                <option value="capsule">Thick Mucoid Polysaccharide Capsule</option>
                                            </select>
                                        </div>

                                    </div>

                                    {/* Reset Filters button */}
                                    <div className="mt-4 flex justify-end">
                                        <button 
                                            onClick={() => setDiffFilter({risk: 'all', sputum: 'all', lab: 'all'})}
                                            className="text-xs text-spy-gold hover:text-yellow-400 font-semibold"
                                        >
                                            Clear Decrypter Filters
                                        </button>
                                    </div>
                                </div>

                                {/* Results Grid */}
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Identified Targets ({filteredPathogens.length})</h3>
                                    
                                    {filteredPathogens.length === 0 ? (
                                        <div className="bg-spy-panel/30 border border-spy-border rounded-2xl p-12 text-center">
                                            <p className="text-slate-400 text-sm">No pathogen matches this exact intelligence filter profile.</p>
                                            <button 
                                                onClick={() => setDiffFilter({risk: 'all', sputum: 'all', lab: 'all'})}
                                                className="mt-4 px-4 py-2 bg-spy-gold text-spy-base rounded-xl text-xs font-bold"
                                            >
                                                Reset Filters
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {filteredPathogens.map(p => (
                                                <div key={p.id} className="bg-spy-panel border border-spy-border rounded-2xl p-5 space-y-4 relative overflow-hidden flex flex-col justify-between shadow-xl">
                                                    <div className="space-y-2">
                                                        <div className="flex items-center justify-between">
                                                            <span className={`text-[9px] px-2 py-0.5 rounded font-bold ${p.type === 'Typical' ? 'bg-blue-950 text-blue-400' : 'bg-purple-950 text-purple-400'}`}>
                                                                {p.type} Target
                                                            </span>
                                                            <span className="text-[11px] font-mono text-slate-500 font-bold">DOSSIER: {p.id.toUpperCase()}</span>
                                                        </div>
                                                        <h4 className="text-xl font-bold text-white italic title-font">{p.name}</h4>
                                                        <p className="text-xs text-spy-pink font-mono">{p.gram}</p>
                                                    </div>

                                                    <div className="space-y-2 text-xs text-slate-300 font-light border-t border-spy-border pt-3">
                                                        <p><strong className="text-spy-gold font-semibold">Risk Scenarios:</strong> {p.riskFactors}</p>
                                                        <p><strong className="text-spy-gold font-semibold">Symptoms:</strong> {p.symptoms}</p>
                                                        <p className="text-spy-pink bg-pink-950/20 p-2.5 rounded border border-pink-900/30">
                                                            <strong className="text-rose-300 block mb-0.5">Anya's mind-reading scan:</strong> {p.anyaTelepathy}
                                                        </p>
                                                    </div>

                                                    <div className="pt-3">
                                                        <button 
                                                            onClick={() => {
                                                                setSelectedPathogen(p.id);
                                                                setActiveTab('radiology');
                                                            }}
                                                            className="w-full text-center py-2 bg-spy-base hover:bg-spy-base/80 border border-spy-border hover:border-spy-gold text-xs font-bold rounded-xl text-spy-gold transition-all"
                                                        >
                                                            Load Classified Radiographs
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Tab Content 3: CURB-65 Calculator */}
                        {activeTab === 'curb' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                                
                                {/* Interactive Toggles */}
                                <div className="lg:col-span-5 bg-spy-panel border border-spy-border rounded-2xl p-6 space-y-6 shadow-xl">
                                    <div>
                                        <span className="text-xs font-mono text-spy-gold uppercase font-semibold">Operation Strix Triage</span>
                                        <h2 className="text-2xl font-bold text-white title-font">CURB-65 Triage Cipher</h2>
                                        <p className="text-xs text-slate-400 mt-1">
                                            Twilight uses these 5 tactical metrics to decide whether a lung infection target can be handled on an outpatient basis (home stay) or requires mobilization of deep ICU forces.
                                        </p>
                                    </div>

                                    {/* Criteria switches */}
                                    <div className="space-y-3">
                                        
                                        {/* C */}
                                        <label className={`flex items-start gap-4 p-3 rounded-xl border cursor-pointer transition-all ${curb.confusion ? 'bg-teal-950/20 border-spy-gold' : 'bg-spy-base border-spy-border hover:border-slate-700'}`}>
                                            <input 
                                                type="checkbox" 
                                                checked={curb.confusion}
                                                onChange={(e) => setCurb({...curb, confusion: e.target.checked})}
                                                className="mt-1 h-4 w-4 accent-spy-gold"
                                            />
                                            <div>
                                                <div className="text-sm font-bold text-white flex items-center gap-2">
                                                    <span className="bg-spy-border text-spy-gold h-5 w-5 rounded flex items-center justify-center font-mono text-xs">C</span>
                                                    Confusion (Anya's mind reads static!)
                                                </div>
                                                <p className="text-xs text-slate-400 font-light mt-0.5">Disorientation to person, place, or time, or acute mental shifts.</p>
                                            </div>
                                        </label>

                                        {/* U */}
                                        <label className={`flex items-start gap-4 p-3 rounded-xl border cursor-pointer transition-all ${curb.urea ? 'bg-teal-950/20 border-spy-gold' : 'bg-spy-base border-spy-border hover:border-slate-700'}`}>
                                            <input 
                                                type="checkbox" 
                                                checked={curb.urea}
                                                onChange={(e) => setCurb({...curb, urea: e.target.checked})}
                                                className="mt-1 h-4 w-4 accent-spy-gold"
                                            />
                                            <div>
                                                <div className="text-sm font-bold text-white flex items-center gap-2">
                                                    <span className="bg-spy-border text-spy-gold h-5 w-5 rounded flex items-center justify-center font-mono text-xs">U</span>
                                                    Urea (BUN) &gt; 19 mg/dL
                                                </div>
                                                <p className="text-xs text-slate-400 font-light mt-0.5">Indicates metabolic stress, dehydration, or failing renal barriers.</p>
                                            </div>
                                        </label>

                                        {/* R */}
                                        <label className={`flex items-start gap-4 p-3 rounded-xl border cursor-pointer transition-all ${curb.respRate ? 'bg-teal-950/20 border-spy-gold' : 'bg-spy-base border-spy-border hover:border-slate-700'}`}>
                                            <input 
                                                type="checkbox" 
                                                checked={curb.respRate}
                                                onChange={(e) => setCurb({...curb, respRate: e.target.checked})}
                                                className="mt-1 h-4 w-4 accent-spy-gold"
                                            />
                                            <div>
                                                <div className="text-sm font-bold text-white flex items-center gap-2">
                                                    <span className="bg-spy-border text-spy-gold h-5 w-5 rounded flex items-center justify-center font-mono text-xs">R</span>
                                                    Respiratory Rate &ge; 30 breaths/min
                                                </div>
                                                <p className="text-xs text-slate-400 font-light mt-0.5">Severe panting, indicating the lungs are working overtime to exchange air.</p>
                                            </div>
                                        </label>

                                        {/* B */}
                                        <label className={`flex items-start gap-4 p-3 rounded-xl border cursor-pointer transition-all ${curb.bp ? 'bg-teal-950/20 border-spy-gold' : 'bg-spy-base border-spy-border hover:border-slate-700'}`}>
                                            <input 
                                                type="checkbox" 
                                                checked={curb.bp}
                                                onChange={(e) => setCurb({...curb, bp: e.target.checked})}
                                                className="mt-1 h-4 w-4 accent-spy-gold"
                                            />
                                            <div>
                                                <div className="text-sm font-bold text-white flex items-center gap-2">
                                                    <span className="bg-spy-border text-spy-gold h-5 w-5 rounded flex items-center justify-center font-mono text-xs">B</span>
                                                    Blood Pressure &lt; 90 mmHg systolic or &le; 60 mmHg diastolic
                                                </div>
                                                <p className="text-xs text-slate-400 font-light mt-0.5">Failing cardiovascular system; high warning for imminent septic shock.</p>
                                            </div>
                                        </label>

                                        {/* 65 */}
                                        <label className={`flex items-start gap-4 p-3 rounded-xl border cursor-pointer transition-all ${curb.age ? 'bg-teal-950/20 border-spy-gold' : 'bg-spy-base border-spy-border hover:border-slate-700'}`}>
                                            <input 
                                                type="checkbox" 
                                                checked={curb.age}
                                                onChange={(e) => setCurb({...curb, age: e.target.checked})}
                                                className="mt-1 h-4 w-4 accent-spy-gold"
                                            />
                                            <div>
                                                <div className="text-sm font-bold text-white flex items-center gap-2">
                                                    <span className="bg-spy-border text-spy-gold h-5 w-5 rounded flex items-center justify-center font-mono text-xs">65</span>
                                                    Age &ge; 65 years old
                                                </div>
                                                <p className="text-xs text-slate-400 font-light mt-0.5">Advanced tactical age carrying a higher baseline mortality risk.</p>
                                            </div>
                                        </label>

                                    </div>

                                    <div className="flex justify-end pt-2">
                                        <button 
                                            onClick={() => setCurb({confusion: false, urea: false, respRate: false, bp: false, age: false})}
                                            className="text-xs text-slate-500 hover:text-slate-300"
                                        >
                                            Reset Triage Cipher
                                        </button>
                                    </div>
                                </div>

                                {/* Score Feedback Display */}
                                <div className="lg:col-span-7 bg-spy-panel/30 border border-spy-border rounded-2xl p-6 md:p-8 space-y-6 flex flex-col justify-between h-full min-h-[400px]">
                                    
                                    {/* Large Score Indicator */}
                                    <div className="text-center space-y-3">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Calculated CURB-65 Threat Index</h3>
                                        
                                        <div className="inline-flex items-center justify-center h-32 w-32 rounded-full border-4 border-spy-gold bg-spy-base shadow-2xl relative">
                                            <span className="text-5xl font-black text-spy-gold">{curbScore}</span>
                                            <span className="absolute bottom-2 text-[10px] text-spy-pink uppercase tracking-wider font-bold">Severity Score</span>
                                        </div>
                                    </div>

                                    {/* Clinical Triage Recommendation */}
                                    <div className={`border rounded-2xl p-5 ${curbRecommendation.color} transition-all duration-300`}>
                                        <div className="text-xs uppercase font-bold tracking-wider opacity-80">Risk Level</div>
                                        <div className="text-lg font-black mt-0.5">{curbRecommendation.level}</div>
                                        
                                        <div className="mt-3 text-sm font-bold border-t border-current/20 pt-3">
                                            Tactical Disposition Plan:
                                        </div>
                                        <div className="text-base font-extrabold text-white mt-1">
                                            {curbRecommendation.action}
                                        </div>
                                        <p className="text-xs text-slate-300 font-light mt-1.5 leading-relaxed">
                                            {curbRecommendation.desc}
                                        </p>
                                    </div>

                                    {/* High Yield Pearls Box */}
                                    <div className="bg-spy-panel border border-spy-border p-4 rounded-xl text-xs space-y-2">
                                        <strong className="text-spy-pink uppercase font-bold block">Anya's Smart Study Note:</strong>
                                        <p className="text-slate-400 font-light leading-relaxed">
                                            Twilight says if they go to the Hospital Ward, always give a **Fluoroquinolone** (Levofloxacin) OR a **Beta-lactam** (Ceftriaxone) plus a **Macrolide** (Azithromycin) so we cover BOTH typical germs and atypical invisible germs!
                                        </p>
                                    </div>

                                </div>
                            </div>
                        )}

                        {/* Tab Content 4: Board Quiz Case Challenges (Eden Midterm Exam) */}
                        {activeTab === 'quiz' && (
                            <div className="max-w-4xl mx-auto space-y-6">
                                
                                {/* Quiz Header */}
                                <div className="bg-spy-panel p-5 rounded-2xl border border-spy-border flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div>
                                        <h2 className="text-xl font-bold text-spy-gold title-font">Eden Academy Midterm Board Exam</h2>
                                        <p className="text-xs text-slate-400 mt-1">Collect Stella Stars for Anya and avoid Tonitrus bolts to maintain high standing!</p>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="text-xs font-mono bg-spy-base px-3 py-1.5 rounded-lg border border-spy-border">
                                            Star Score: <span className="text-spy-gold font-bold text-sm">{stellaCount} ⭐</span> / {CASES.length}
                                        </div>
                                        <button 
                                            onClick={resetQuiz}
                                            className="px-3 py-1.5 bg-spy-base hover:bg-spy-base/60 text-slate-400 hover:text-white border border-spy-border rounded-lg text-xs font-semibold transition-all"
                                        >
                                            Reset Exam
                                        </button>
                                    </div>
                                </div>

                                {/* Expelled Warning if 8 Tonitrus bolts reached */}
                                {tonitrusCount >= 8 ? (
                                    <div className="bg-rose-950/40 border border-rose-500 rounded-2xl p-8 text-center space-y-4">
                                        <span className="text-5xl block">(T＿T)</span>
                                        <h3 className="text-2xl font-bold text-rose-400">Anya Got Expelled!</h3>
                                        <p className="text-xs text-slate-300 max-w-md mx-auto">
                                            Oh no! You collected too many Tonitrus Bolts. Housemaster Henderson says this is completely un-elegant! Let's wipe the slate clean and try again.
                                        </p>
                                        <button 
                                            onClick={resetQuiz}
                                            className="px-4 py-2 bg-spy-gold text-spy-base font-bold rounded-xl text-xs"
                                        >
                                            Retry Anya's Exam
                                        </button>
                                    </div>
                                ) : (
                                    /* Case Panel */
                                    <div className="bg-spy-panel border border-spy-border rounded-2xl p-6 md:p-8 space-y-6 shadow-xl">
                                        
                                        {/* Case Title */}
                                        <div className="flex items-center justify-between">
                                            <span className="text-xs bg-teal-950/60 text-spy-gold border border-spy-border px-3 py-1 rounded-full font-bold">Case Question {quizIndex + 1} of {CASES.length}</span>
                                            <span className="text-xs text-slate-500 font-mono">Classified USMLE Cipher</span>
                                        </div>

                                        {/* Question text */}
                                        <div className="p-4 bg-spy-base border border-spy-border rounded-xl leading-relaxed text-sm md:text-base font-light text-slate-200">
                                            {CASES[quizIndex].vignette}
                                        </div>

                                        {/* Multiple choice selections */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            {CASES[quizIndex].options.map((opt) => {
                                                let btnStyle = "bg-spy-base border-spy-border hover:border-spy-gold text-slate-300";
                                                if (quizAnswered) {
                                                    if (opt.correct) {
                                                        btnStyle = "bg-emerald-950/40 border-emerald-500 text-emerald-400";
                                                    } else if (selectedOption?.key === opt.key) {
                                                        btnStyle = "bg-rose-950/40 border-rose-500 text-rose-400";
                                                    } else {
                                                        btnStyle = "bg-spy-base/20 border-spy-border/20 text-slate-500 opacity-60";
                                                    }
                                                }

                                                return (
                                                    <button
                                                        key={opt.key}
                                                        disabled={quizAnswered}
                                                        onClick={() => handleQuizAnswer(opt)}
                                                        className={`p-4 rounded-xl border text-left flex items-start gap-3 transition-all ${btnStyle}`}
                                                    >
                                                        <span className="font-mono font-bold text-xs bg-spy-panel h-6 w-6 rounded flex items-center justify-center shrink-0 border border-spy-border">{opt.key}</span>
                                                        <div className="text-sm font-semibold">{opt.text}</div>
                                                    </button>
                                                );
                                            })}
                                        </div>

                                        {/* Feedback / Explanations */}
                                        {quizAnswered && (
                                            <div className="bg-spy-base/80 border border-spy-border p-5 rounded-xl space-y-4">
                                                <div className="flex items-center gap-2">
                                                    {selectedOption?.correct ? (
                                                        <span className="text-emerald-400 font-bold text-sm flex items-center gap-1.5">
                                                            <span>⭐</span>
                                                            Henderson screams: "ELEGANT! Anya earns a Stella Star!"
                                                        </span>
                                                    ) : (
                                                        <span className="text-rose-400 font-bold text-sm flex items-center gap-1.5">
                                                            <span>⚡</span>
                                                            Anya receives a Tonitrus Bolt! Crying Anya: "Anya will do better!"
                                                        </span>
                                                    )}
                                                </div>

                                                <p className="text-xs md:text-sm text-slate-300 font-light leading-relaxed">
                                                    <span dangerouslySetInnerHTML={{ __html: CASES[quizIndex].explanation }} />
                                                </p>

                                                <div className="bg-yellow-950/20 p-3 rounded-lg border border-spy-gold/30 text-xs text-spy-gold">
                                                    <strong>Twilight's Mission Memo:</strong> {CASES[quizIndex].pearl}
                                                </div>

                                                <div className="flex justify-end">
                                                    <button
                                                        onClick={nextQuizQuestion}
                                                        className="px-4 py-2 bg-spy-gold hover:bg-yellow-400 text-spy-base font-bold rounded-xl text-xs flex items-center gap-1.5 transition-all shadow-lg shadow-spy-gold/10"
                                                    >
                                                        Next Midterm Challenge
                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    {/* Footer with Eden School motto */}
                    <footer className="border-t border-spy-border bg-spy-panel/80 p-6 text-center text-xs text-slate-500 mt-12 space-y-2">
                        <p className="text-spy-gold font-bold uppercase tracking-wider mono text-[10px]">Eden Academy Medical Honor Board • Operation Strix</p>
                        <p>© 2026 Pulmonology Intelligence Branch. Created for high-yield USMLE educational study and training review missions.</p>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
